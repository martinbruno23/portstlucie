<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Be a Founder — Port St. Lucie SC</title>

  <!-- Fuentes de marca -->
  <link rel="stylesheet" href="../tokens/fonts.css?v=17" />
  <!-- Tokens -->
  <link rel="stylesheet" href="../tokens/tokens.css?v=17" />

  <!-- Patrones compartidos -->
  <link rel="stylesheet" href="../native/_patterns/cards.css?v=17" />

  <!-- Nav compartido (reusa el bloque de Home) -->
  <link rel="stylesheet" href="../native/home/00-nav.css?v=17" />
  <link rel="stylesheet" href="../native/home/09-cierre-footer.css?v=17" />

  <!-- Bloques Sumate -->
  <link rel="stylesheet" href="../native/sumate/s01-hero.css?v=17" />
  <link rel="stylesheet" href="../native/sumate/s02-benefits.css?v=17" />
  <link rel="stylesheet" href="../native/sumate/s03-plans.css?v=17" />
  <link rel="stylesheet" href="../native/sumate/s04-wall.css?v=17" />
  <link rel="stylesheet" href="../native/sumate/s05-faq.css?v=17" />
  <link rel="stylesheet" href="../native/sumate/s06-cta.css?v=17" />
  <link rel="stylesheet" href="../custom/founder-wall/founder-wall.css?v=17" />

  <style>
    html, body { margin: 0; padding: 0; background: var(--color-ink); }
    body { font-family: var(--font-body); color: var(--color-text); overflow-x: hidden; }
    ::selection { background: var(--color-aqua); color: var(--color-black); }
  </style>
</head>
<body>
  <div data-block="00-nav"></div>
  <div data-block="s01-hero"></div>
  <div data-block="s02-benefits"></div>
  <div data-block="s03-plans"></div>
  <div data-block="s04-wall"></div>
  <div data-block="s05-faq"></div>
  <div data-block="s06-cta"></div>
  <div data-block="footer"></div>

  <script type="module">
    // Nav se toma del bloque compartido de Home; el resto son bloques de /sumate.
    const blocks = [
      { slot: '00-nav',       path: '../native/home/00-nav.html' },
      { slot: 's01-hero',     path: '../native/sumate/s01-hero.html' },
      { slot: 's02-benefits', path: '../native/sumate/s02-benefits.html' },
      { slot: 's03-plans',    path: '../native/sumate/s03-plans.html' },
      { slot: 's04-wall',     path: '../native/sumate/s04-wall.html' },
      { slot: 's05-faq',      path: '../native/sumate/s05-faq.html' },
      { slot: 's06-cta',      path: '../native/sumate/s06-cta.html' },
      { slot: 'footer',       path: '../native/home/09-cierre-footer.html' },
    ];
    const bust = `?t=${Date.now()}`;   // cache-buster solo-preview para los HTML de bloque
    await Promise.all(blocks.map(async ({ slot, path }) => {
      const html = await fetch(path + bust).then((r) => r.text());
      document.querySelector(`[data-block="${slot}"]`).innerHTML = html;
    }));
    // i18n primero (aplica idioma guardado; el toggle EN/ES vive en la nav compartida)
    const { initI18n } = await import('../i18n/i18n.js?v=17');
    initI18n();
    // init del form de newsletter del footer (bloque compartido de Home)
    const { initNewsletter } = await import('../native/home/09-cierre-footer.js?v=17');
    initNewsletter();
  </script>

  <!-- Web component del muro -->
  <script type="module" src="../custom/founder-wall/founder-wall.js?v=17"></script>
</body>
</html>
