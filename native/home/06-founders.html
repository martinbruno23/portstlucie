  Layout del diseño aprobado: "your number" card (gradiente cálido + Luca) + lista en vivo.
  El carnet compartible 9:16 (Pieza B) vive en la página Sumate (S04), no acá.
-->
<section class="founders surface-paper" id="founders">
  <div class="psl-container">
    <header class="founders__head">
      <span class="psl-kicker" data-es="05 — Miembros Fundadores">05 — Founding members</span>

    </header>

    <div class="founders__grid">
      <!-- "your number" prompt card -->
      <div class="fnum">
        <span class="fnum__kicker" data-es="PSL SC · Miembro Fundador">PSL SC · Founding Member</span>
        <span class="fnum__number tnum">#1250</span>
        <span class="fnum__title" data-es="El próximo puedes ser tú">You could be next</span>
        <span class="fnum__desc" data-es="Depósito fundador reembolsable. La ventana cierra antes del primer silbato en 2027.">Refundable founding deposit. Window closes before the first whistle in 2027.</span>
        <a href="sumate.html#plans" class="psl-btn cta-primary fnum__cta"><span data-es="Reclama tu número">Claim my number</span> <span aria-hidden="true">→</span></a>
        <img class="fnum__mascot" src="/src/assets/luca.png" alt="" aria-hidden="true" />

      <!-- live list -->
      <psl-founder-wall max-visible="6"></psl-founder-wall>
    </div>
